<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeLog — 一日一枚</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #020208;
      --bg-alt:      #05050f;
      --surface:     #0a0a18;
      --surface2:    #0f0f22;
      --border:      rgba(0, 255, 200, .2);
      --accent:      #ff00aa;
      --accent-glow: #cc0088;
      --cyan:        #00fff0;
      --text:        #c8e8ff;
      --muted:       #4a6080;
      --radius:      2px;
      --danger:      #ff003c;
      --today-color: #ff00aa;
      --has-photo:   rgba(0, 255, 240, .12);
      --neon-yellow: #f0ff00;
    }

    @keyframes scanline {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }

    @keyframes glitch {
      0%  { clip-path: inset(40% 0 60% 0); transform: translate(-4px, 0); }
      20% { clip-path: inset(70% 0 10% 0); transform: translate(4px, 0); }
      40% { clip-path: inset(20% 0 70% 0); transform: translate(-2px, 0); }
      60% { clip-path: inset(60% 0 20% 0); transform: translate(2px, 0); }
      80% { clip-path: inset(10% 0 80% 0); transform: translate(-3px, 0); }
      100%{ clip-path: inset(80% 0 5%  0); transform: translate(3px, 0); }
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: .8; }
      97% { opacity: 1; }
      98% { opacity: .6; }
      99% { opacity: 1; }
    }

    @keyframes border-pulse {
      0%, 100% { box-shadow: 0 0 6px rgba(0,255,200,.3), inset 0 0 6px rgba(0,255,200,.05); }
      50%       { box-shadow: 0 0 18px rgba(0,255,200,.6), inset 0 0 12px rgba(0,255,200,.1); }
    }

    html, body {
      height: 100%;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* スキャンライン＆グリッドオーバーレイ */
    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background-image:
        linear-gradient(rgba(0,255,200,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,200,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: flicker 8s infinite;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.15) 2px,
        rgba(0,0,0,.15) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    body::after {
      content: '';
      position: fixed;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(transparent, rgba(0,255,200,.04), transparent);
      animation: scanline 6s linear infinite;
      pointer-events: none;
      z-index: 998;
    }

    /* ── Header ────────────────────────────────── */
    #app-header {
      height: 56px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      background: rgba(2, 2, 8, .95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--cyan);
      box-shadow: 0 2px 20px rgba(0,255,200,.15), 0 1px 0 rgba(0,255,200,.3);
      z-index: 10;
    }

    .app-logo {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--cyan);
      text-shadow: 0 0 10px var(--cyan), 0 0 30px rgba(0,255,200,.5);
      letter-spacing: .15em;
      text-transform: uppercase;
      position: relative;
    }

    .app-logo::before {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent);
      animation: glitch 4s infinite;
      opacity: .6;
    }

    /* ── Month navigation ───────────────────────── */
    #month-nav {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      width: 34px;
      height: 34px;
      border-radius: 0;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .2s, box-shadow .2s, background .2s;
      clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
    }
    .nav-btn:hover {
      background: rgba(0,255,200,.1);
      box-shadow: 0 0 16px rgba(0,255,200,.5);
    }

    #month-label {
      font-family: 'Orbitron', monospace;
      font-size: .9rem;
      font-weight: 700;
      min-width: 120px;
      text-align: center;
      color: var(--cyan);
      text-shadow: 0 0 8px rgba(0,255,200,.5);
      letter-spacing: .1em;
    }

    .btn-today {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: .3rem .9rem;
      border-radius: 0;
      font-size: .75rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, box-shadow .2s;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: .1em;
      text-transform: uppercase;
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    }
    .btn-today:hover {
      background: rgba(255,0,170,.15);
      box-shadow: 0 0 16px rgba(255,0,170,.4);
      color: #fff;
    }

    /* ── Main layout ────────────────────────────── */
    #app-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Calendar area ──────────────────────────── */
    #calendar-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 1rem 1.2rem;
    }

    /* Day-of-week header */
    #dow-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 4px;
    }

    .dow-cell {
      text-align: center;
      font-size: .68rem;
      font-weight: 700;
      color: var(--muted);
      padding: .2rem 0;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-family: 'Orbitron', monospace;
    }
    .dow-cell:first-child { color: #ff4466; text-shadow: 0 0 8px rgba(255,50,80,.5); }
    .dow-cell:last-child  { color: var(--accent); text-shadow: 0 0 8px rgba(255,0,170,.4); }

    /* Calendar grid */
    #cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      flex: 1;
    }

    .day-cell {
      background: var(--surface);
      border: 1px solid rgba(0,255,200,.12);
      border-radius: 0;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color .15s, box-shadow .15s, transform .1s;
      min-height: 80px;
      clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
    }
    .day-cell::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 8px 8px 0;
      border-color: transparent rgba(0,255,200,.25) transparent transparent;
      z-index: 2;
    }
    .day-cell:hover {
      border-color: var(--cyan);
      box-shadow: 0 0 20px rgba(0,255,200,.2), inset 0 0 20px rgba(0,255,200,.04);
      transform: scale(1.02);
      z-index: 1;
    }
    .day-cell.other-month {
      opacity: .2;
    }
    .day-cell.today {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(255,0,170,.35), inset 0 0 15px rgba(255,0,170,.06);
      animation: border-pulse 2s ease-in-out infinite;
    }
    .day-cell.today::before {
      border-color: transparent var(--accent) transparent transparent;
    }
    .day-cell.selected {
      border-color: var(--cyan);
      box-shadow: 0 0 25px rgba(0,255,200,.4), inset 0 0 20px rgba(0,255,200,.08);
    }
    .day-cell.has-photo {
      border-color: rgba(0,255,200,.3);
    }

    /* Photo background thumbnail */
    .day-thumb {
      position: absolute;
      inset: 0;
      object-fit: cover;
      width: 100%;
      height: 100%;
      opacity: .4;
      transition: opacity .2s;
      filter: saturate(1.5) hue-rotate(10deg);
    }
    .day-cell:hover .day-thumb { opacity: .65; }

    /* Date number */
    .day-num {
      position: relative;
      z-index: 1;
      font-size: .75rem;
      font-weight: 700;
      padding: .35rem .45rem .2rem;
      line-height: 1;
      font-family: 'Orbitron', monospace;
    }
    .day-cell.today .day-num {
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent);
    }
    .day-cell.today .day-num::after {
      content: '';
      display: block;
      width: 22px;
      height: 22px;
      background: rgba(255,0,170,.2);
      border: 1px solid var(--accent);
      border-radius: 0;
      position: absolute;
      top: .25rem;
      left: .3rem;
      z-index: -1;
    }
    /* 日曜 */
    .day-cell:nth-child(7n+1) .day-num { color: #ff4466; }
    /* 土曜 */
    .day-cell:nth-child(7n) .day-num   { color: var(--accent); }

    /* Indicators */
    .day-indicators {
      position: relative;
      z-index: 1;
      margin-top: auto;
      padding: .25rem .4rem;
      display: flex;
      gap: .3rem;
      flex-wrap: wrap;
    }

    .day-note-preview {
      position: relative;
      z-index: 1;
      font-size: .6rem;
      color: rgba(0,255,200,.8);
      padding: 0 .45rem .3rem;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 0 6px rgba(0,255,200,.6);
    }

    .tag-dot {
      width: 6px;
      height: 6px;
      border-radius: 0;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      flex-shrink: 0;
      transform: rotate(45deg);
    }

    /* ── Detail Panel ───────────────────────────── */
    #detail-panel {
      width: 360px;
      flex-shrink: 0;
      background: var(--bg-alt);
      border-left: 1px solid var(--cyan);
      box-shadow: -4px 0 30px rgba(0,255,200,.1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      transition: transform .3s ease;
    }

    #detail-panel.hidden-panel {
      transform: translateX(100%);
      width: 0;
      overflow: hidden;
      border: none;
    }

    #detail-header {
      padding: 1.2rem 1.4rem .8rem;
      border-bottom: 1px solid rgba(0,255,200,.2);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #detail-date-label {
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 10px rgba(0,255,200,.5);
      letter-spacing: .05em;
    }

    #detail-weekday {
      font-size: .78rem;
      color: var(--muted);
      margin-top: .1rem;
      letter-spacing: .08em;
    }

    .btn-close-panel {
      background: none;
      border: 1px solid var(--muted);
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      padding: .1rem .4rem;
      border-radius: 0;
      transition: color .2s, border-color .2s, box-shadow .2s;
    }
    .btn-close-panel:hover {
      color: var(--danger);
      border-color: var(--danger);
      box-shadow: 0 0 10px rgba(255,0,60,.3);
    }

    /* Photo hero */
    #photo-hero {
      flex-shrink: 0;
      position: relative;
      background: var(--surface);
      cursor: pointer;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
      border-bottom: 1px solid rgba(0,255,200,.15);
    }
    #photo-hero:hover { background: var(--surface2); }

    #hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(1.3) contrast(1.1);
    }

    #photo-upload-hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
      color: var(--muted);
      pointer-events: none;
    }
    #photo-upload-hint .hint-icon { font-size: 2.5rem; filter: grayscale(1); }
    #photo-upload-hint p { font-size: .82rem; letter-spacing: .08em; text-transform: uppercase; }

    #photo-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.6);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
    }
    #photo-hero:hover #photo-overlay { opacity: 1; }
    #photo-overlay span {
      font-size: .82rem;
      color: var(--cyan);
      font-weight: 700;
      background: rgba(0,255,200,.12);
      border: 1px solid var(--cyan);
      padding: .4rem 1.2rem;
      border-radius: 0;
      letter-spacing: .1em;
      text-transform: uppercase;
      text-shadow: 0 0 10px var(--cyan);
    }

    #photo-input { display: none; }

    /* Photo actions bar */
    #photo-actions {
      display: flex;
      justify-content: flex-end;
      padding: .4rem .8rem;
      flex-shrink: 0;
    }

    /* Detail body */
    #detail-body {
      padding: 1rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      flex: 1;
    }

    /* Note textarea */
    #detail-note {
      background: var(--surface);
      border: 1px solid rgba(0,255,200,.2);
      border-radius: 0;
      color: var(--text);
      font-size: .88rem;
      line-height: 1.75;
      padding: .8rem 1rem;
      resize: vertical;
      min-height: 140px;
      outline: none;
      font-family: 'Share Tech Mono', monospace;
      transition: border-color .2s, box-shadow .2s;
      width: 100%;
    }
    #detail-note::placeholder { color: var(--muted); }
    #detail-note:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 16px rgba(0,255,200,.15), inset 0 0 10px rgba(0,255,200,.04);
    }

    /* Tag input */
    .detail-label {
      font-size: .68rem;
      font-weight: 700;
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: .12em;
      margin-bottom: .4rem;
      font-family: 'Orbitron', monospace;
      text-shadow: 0 0 8px rgba(0,255,200,.4);
    }

    .tag-input-wrap {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: .35rem;
      background: var(--surface);
      border: 1px solid rgba(0,255,200,.2);
      border-radius: 0;
      padding: .45rem .7rem;
      transition: border-color .2s;
    }
    .tag-input-wrap:focus-within {
      border-color: var(--cyan);
      box-shadow: 0 0 12px rgba(0,255,200,.15);
    }

    #detail-tag-input {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: .82rem;
      outline: none;
      min-width: 100px;
      flex: 1;
      font-family: 'Share Tech Mono', monospace;
    }
    #detail-tag-input::placeholder { color: var(--muted); }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: .2rem;
      background: rgba(255,0,170,.12);
      border: 1px solid rgba(255,0,170,.4);
      color: var(--accent);
      font-size: .68rem;
      font-weight: 700;
      padding: .18rem .55rem;
      border-radius: 0;
      white-space: nowrap;
      text-shadow: 0 0 6px rgba(255,0,170,.4);
      clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
    }
    .tag-chip .remove-tag {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: .75rem;
      padding: 0 .05rem;
      line-height: 1;
    }
    .tag-chip .remove-tag:hover { color: var(--danger); text-shadow: 0 0 8px var(--danger); }

    /* Footer buttons */
    #detail-footer {
      padding: .8rem 1.4rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-top: 1px solid rgba(0,255,200,.15);
    }

    #save-indicator {
      font-size: .75rem;
      color: var(--cyan);
      opacity: 0;
      transition: opacity .3s;
      text-shadow: 0 0 8px var(--cyan);
      letter-spacing: .08em;
    }
    #save-indicator.visible { opacity: 1; }

    .btn-primary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: .5rem 1.6rem;
      border-radius: 0;
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 0 16px rgba(255,0,170,.25);
      transition: background .2s, box-shadow .2s, transform .12s;
      font-family: 'Orbitron', monospace;
      letter-spacing: .1em;
      text-transform: uppercase;
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    }
    .btn-primary:hover {
      background: rgba(255,0,170,.15);
      box-shadow: 0 0 30px rgba(255,0,170,.5);
      transform: translateY(-2px);
    }

    .btn-danger-sm {
      background: none;
      border: none;
      color: var(--muted);
      font-size: .75rem;
      cursor: pointer;
      padding: .3rem .6rem;
      border-radius: 0;
      transition: color .2s, text-shadow .2s;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: .06em;
    }
    .btn-danger-sm:hover {
      color: var(--danger);
      text-shadow: 0 0 10px var(--danger);
    }

    /* ── Utilities ──────────────────────────────── */
    .hidden { display: none !important; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,255,200,.25); border-radius: 0; }

    /* ── Mobile ─────────────────────────────────── */
    @media (max-width: 700px) {
      #detail-panel {
        position: fixed;
        inset: 56px 0 0 0;
        width: 100% !important;
        z-index: 20;
        border: none;
        transform: none;
      }
      #detail-panel.hidden-panel {
        transform: translateX(100%);
        width: 100% !important;
      }
      #calendar-area { padding: .6rem; }
      .day-cell { min-height: 52px; }
      .day-num { font-size: .62rem; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header id="app-header">
    <span class="app-logo" data-text="LifeLog">LifeLog</span>

    <div id="month-nav">
      <button class="nav-btn" id="btn-prev" title="前の月">&#8249;</button>
      <span id="month-label"></span>
      <button class="nav-btn" id="btn-next" title="次の月">&#8250;</button>
      <button class="btn-today" id="btn-today">今日</button>
    </div>
  </header>

  <div id="app-layout">

    <!-- Calendar -->
    <div id="calendar-area">
      <div id="dow-header">
        <div class="dow-cell">日</div>
        <div class="dow-cell">月</div>
        <div class="dow-cell">火</div>
        <div class="dow-cell">水</div>
        <div class="dow-cell">木</div>
        <div class="dow-cell">金</div>
        <div class="dow-cell">土</div>
      </div>
      <div id="cal-grid"></div>
    </div>

    <!-- Detail panel -->
    <aside id="detail-panel" class="hidden-panel">
      <div id="detail-header">
        <div>
          <div id="detail-date-label"></div>
          <div id="detail-weekday"></div>
        </div>
        <button class="btn-close-panel" id="btn-close-panel" title="閉じる">✕</button>
      </div>

      <!-- Photo hero -->
      <label id="photo-hero" for="photo-input">
        <img id="hero-img" src="" alt="" class="hidden">
        <div id="photo-upload-hint">
          <span class="hint-icon">📷</span>
          <p>クリックして写真を追加</p>
        </div>
        <div id="photo-overlay"><span>写真を変更</span></div>
        <input id="photo-input" type="file" accept="image/*">
      </label>

      <div id="photo-actions">
        <button class="btn-danger-sm hidden" id="btn-remove-photo">写真を削除</button>
      </div>

      <div id="detail-body">
        <div>
          <p class="detail-label">メモ</p>
          <textarea id="detail-note" placeholder="今日の出来事を記録しよう..."></textarea>
        </div>
        <div>
          <p class="detail-label">タグ</p>
          <div class="tag-input-wrap">
            <div id="tag-display"></div>
            <input id="detail-tag-input" type="text" placeholder="追加（Enter）">
          </div>
        </div>
      </div>

      <div id="detail-footer">
        <span id="save-indicator">✓ 保存済み</span>
        <button class="btn-primary" id="btn-save">保存</button>
      </div>
    </aside>

  </div><!-- #app-layout -->

  <script>
  (function () {
    'use strict';

    // ── 定数 ──────────────────────────────────────
    const STORAGE_KEY    = 'lifelog_v1';
    const AUTOSAVE_DELAY = 700;
    const MAX_PHOTO_SIZE = 4 * 1024 * 1024; // 4MB
    const WEEKDAYS = ['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];

    // ── State ─────────────────────────────────────
    const state = {
      data:        {},      // { "YYYY-MM-DD": { photo, note, tags } }
      viewYear:    0,
      viewMonth:   0,       // 0-indexed
      selectedDate: null,   // "YYYY-MM-DD"
    };

    // ── localStorage ──────────────────────────────
    function load() {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    }

    function save() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
      } catch (e) {
        if (e.name === 'QuotaExceededError') {
          alert('ストレージ容量が不足しています。古いエントリや写真を削除してください。');
        }
      }
    }

    // ── 日付ユーティリティ ─────────────────────────
    function dateKey(y, m, d) {
      return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }

    function todayKey() {
      const t = new Date();
      return dateKey(t.getFullYear(), t.getMonth(), t.getDate());
    }

    function formatDateLabel(key) {
      const [y, m, d] = key.split('-').map(Number);
      return `${y}年${m}月${d}日`;
    }

    function getWeekday(key) {
      const [y, m, d] = key.split('-').map(Number);
      return WEEKDAYS[new Date(y, m-1, d).getDay()];
    }

    // ── カレンダー描画 ─────────────────────────────
    function renderCalendar() {
      const y  = state.viewYear;
      const m  = state.viewMonth;
      const tk = todayKey();

      // ヘッダー
      document.getElementById('month-label').textContent =
        `${y}年 ${m+1}月`;

      const grid = document.getElementById('cal-grid');
      grid.innerHTML = '';

      const firstDay  = new Date(y, m, 1).getDay();  // 0=日
      const lastDate  = new Date(y, m+1, 0).getDate();

      // 前月の日数
      const prevLastDate = new Date(y, m, 0).getDate();

      // 6行 × 7列 = 42セル
      const totalCells = 42;
      const frag = document.createDocumentFragment();

      for (let i = 0; i < totalCells; i++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell';

        let key, dayNum, isOther = false;

        if (i < firstDay) {
          // 前月
          dayNum = prevLastDate - firstDay + i + 1;
          const pm = m - 1 < 0 ? 11 : m - 1;
          const py = m - 1 < 0 ? y - 1 : y;
          key = dateKey(py, pm, dayNum);
          isOther = true;
        } else if (i - firstDay + 1 > lastDate) {
          // 翌月
          dayNum = i - firstDay - lastDate + 1;
          const nm = m + 1 > 11 ? 0 : m + 1;
          const ny = m + 1 > 11 ? y + 1 : y;
          key = dateKey(ny, nm, dayNum);
          isOther = true;
        } else {
          dayNum = i - firstDay + 1;
          key = dateKey(y, m, dayNum);
        }

        cell.dataset.key = key;
        if (isOther) cell.classList.add('other-month');
        if (key === tk) cell.classList.add('today');
        if (key === state.selectedDate) cell.classList.add('selected');

        const entry = state.data[key];

        // サムネイル
        if (entry && entry.photo) {
          cell.classList.add('has-photo');
          const img = document.createElement('img');
          img.className = 'day-thumb';
          img.src = entry.photo;
          img.alt = '';
          cell.appendChild(img);
        }

        // 日付番号
        const numEl = document.createElement('div');
        numEl.className = 'day-num';
        numEl.textContent = dayNum;
        cell.appendChild(numEl);

        // ノートプレビュー（写真なし時のみ）
        if (entry && entry.note && !entry.photo) {
          const noteEl = document.createElement('div');
          noteEl.className = 'day-note-preview';
          noteEl.textContent = entry.note.slice(0, 30);
          cell.appendChild(noteEl);
        }

        // タグドット
        if (entry && entry.tags && entry.tags.length > 0) {
          const indEl = document.createElement('div');
          indEl.className = 'day-indicators';
          entry.tags.slice(0, 4).forEach(() => {
            const dot = document.createElement('span');
            dot.className = 'tag-dot';
            indEl.appendChild(dot);
          });
          cell.appendChild(indEl);
        }

        cell.addEventListener('click', () => openDay(key));
        frag.appendChild(cell);
      }

      grid.appendChild(frag);
    }

    // ── 詳細パネル ─────────────────────────────────
    function openDay(key) {
      state.selectedDate = key;

      // カレンダーのselected更新
      document.querySelectorAll('.day-cell').forEach(c => {
        c.classList.toggle('selected', c.dataset.key === key);
      });

      const panel = document.getElementById('detail-panel');
      panel.classList.remove('hidden-panel');

      // ヘッダー
      document.getElementById('detail-date-label').textContent = formatDateLabel(key);
      document.getElementById('detail-weekday').textContent    = getWeekday(key);

      // エントリ読み込み
      const entry = state.data[key] || { photo: null, note: '', tags: [] };

      // 写真
      renderHeroPhoto(entry.photo);

      // ノート
      document.getElementById('detail-note').value = entry.note || '';

      // タグ
      renderTagDisplay(entry.tags || []);

      // tag input リセット
      document.getElementById('detail-tag-input').value = '';
      hideSaveIndicator();
    }

    function closePanel() {
      clearTimeout(autosaveTimer);
      saveEntry();
      state.selectedDate = null;
      document.getElementById('detail-panel').classList.add('hidden-panel');
      document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
    }

    function renderHeroPhoto(photo) {
      const heroImg   = document.getElementById('hero-img');
      const hint      = document.getElementById('photo-upload-hint');
      const removeBtn = document.getElementById('btn-remove-photo');

      if (photo) {
        heroImg.src = photo;
        heroImg.classList.remove('hidden');
        hint.classList.add('hidden');
        removeBtn.classList.remove('hidden');
      } else {
        heroImg.src = '';
        heroImg.classList.add('hidden');
        hint.classList.remove('hidden');
        removeBtn.classList.add('hidden');
      }
    }

    function renderTagDisplay(tags) {
      const el = document.getElementById('tag-display');
      el.innerHTML = tags.map(t =>
        `<span class="tag-chip">${escHtml(t)}<button class="remove-tag" data-tag="${escHtml(t)}" title="削除">✕</button></span>`
      ).join('');
    }

    // ── エントリ保存 ───────────────────────────────
    let autosaveTimer = null;

    function scheduleAutosave() {
      clearTimeout(autosaveTimer);
      autosaveTimer = setTimeout(saveEntry, AUTOSAVE_DELAY);
    }

    function saveEntry() {
      const key = state.selectedDate;
      if (!key) return;

      const note = document.getElementById('detail-note').value;
      const existing = state.data[key] || { photo: null, tags: [] };

      // 変化がなければスキップ
      if (existing.note === note) return;

      state.data[key] = {
        photo: existing.photo || null,
        note,
        tags: existing.tags || [],
      };
      save();
      refreshDayCell(key);
      showSaveIndicator();
    }

    function saveEntryNow() {
      const key = state.selectedDate;
      if (!key) return;
      const note = document.getElementById('detail-note').value;
      const existing = state.data[key] || { photo: null, tags: [] };
      state.data[key] = {
        photo: existing.photo || null,
        note,
        tags: existing.tags || [],
      };
      save();
      refreshDayCell(key);
      showSaveIndicator();
    }

    function showSaveIndicator() {
      const el = document.getElementById('save-indicator');
      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 2000);
    }

    function hideSaveIndicator() {
      document.getElementById('save-indicator').classList.remove('visible');
    }

    // カレンダーの1セルだけ再描画
    function refreshDayCell(key) {
      const cell = document.querySelector(`.day-cell[data-key="${key}"]`);
      if (!cell) return;

      const entry = state.data[key];
      const tk    = todayKey();

      // サムネイル更新
      const existing = cell.querySelector('.day-thumb');
      if (existing) existing.remove();

      cell.classList.remove('has-photo');
      if (entry && entry.photo) {
        cell.classList.add('has-photo');
        const img = document.createElement('img');
        img.className = 'day-thumb';
        img.src = entry.photo;
        img.alt = '';
        cell.insertBefore(img, cell.firstChild);
      }

      // ノートプレビュー更新
      const noteEl = cell.querySelector('.day-note-preview');
      if (noteEl) noteEl.remove();
      if (entry && entry.note && !entry.photo) {
        const el = document.createElement('div');
        el.className = 'day-note-preview';
        el.textContent = entry.note.slice(0, 30);
        // タグドットの前に挿入
        const dots = cell.querySelector('.day-indicators');
        cell.insertBefore(el, dots);
      }

      // タグドット更新
      const dotsEl = cell.querySelector('.day-indicators');
      if (dotsEl) dotsEl.remove();
      if (entry && entry.tags && entry.tags.length > 0) {
        const indEl = document.createElement('div');
        indEl.className = 'day-indicators';
        entry.tags.slice(0, 4).forEach(() => {
          const dot = document.createElement('span');
          dot.className = 'tag-dot';
          indEl.appendChild(dot);
        });
        cell.appendChild(indEl);
      }
    }

    // ── 写真 ───────────────────────────────────────
    function attachPhoto(file) {
      if (!file) return;
      if (!file.type.startsWith('image/')) {
        alert('画像ファイルを選択してください。');
        return;
      }
      if (file.size > MAX_PHOTO_SIZE) {
        alert(`画像は4MB以下にしてください（現在: ${(file.size/1024/1024).toFixed(1)}MB）`);
        return;
      }

      const reader = new FileReader();
      reader.onload = e => {
        const key = state.selectedDate;
        if (!key) return;
        if (!state.data[key]) state.data[key] = { photo: null, note: '', tags: [] };
        state.data[key].photo = e.target.result;
        save();
        renderHeroPhoto(e.target.result);
        refreshDayCell(key);
        showSaveIndicator();
        document.getElementById('photo-input').value = '';
      };
      reader.onerror = () => alert('画像の読み込みに失敗しました。');
      reader.readAsDataURL(file);
    }

    function removePhoto() {
      const key = state.selectedDate;
      if (!key || !state.data[key]) return;
      state.data[key].photo = null;
      save();
      renderHeroPhoto(null);
      refreshDayCell(key);
      showSaveIndicator();
    }

    // ── タグ ───────────────────────────────────────
    function addTag(tagName) {
      const tag = tagName.trim().replace(/,/g, '').replace(/　/g, '');
      if (!tag) return;
      const key = state.selectedDate;
      if (!key) return;
      if (!state.data[key]) state.data[key] = { photo: null, note: '', tags: [] };
      if (state.data[key].tags.includes(tag)) {
        document.getElementById('detail-tag-input').value = '';
        return;
      }
      state.data[key].tags.push(tag);
      save();
      renderTagDisplay(state.data[key].tags);
      refreshDayCell(key);
      document.getElementById('detail-tag-input').value = '';
    }

    function removeTag(tagName) {
      const key = state.selectedDate;
      if (!key || !state.data[key]) return;
      state.data[key].tags = state.data[key].tags.filter(t => t !== tagName);
      save();
      renderTagDisplay(state.data[key].tags);
      refreshDayCell(key);
    }

    // ── エスケープ ──────────────────────────────────
    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
               .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    // ── イベント ───────────────────────────────────
    // 月ナビ
    document.getElementById('btn-prev').addEventListener('click', () => {
      if (state.viewMonth === 0) { state.viewMonth = 11; state.viewYear--; }
      else state.viewMonth--;
      renderCalendar();
    });

    document.getElementById('btn-next').addEventListener('click', () => {
      if (state.viewMonth === 11) { state.viewMonth = 0; state.viewYear++; }
      else state.viewMonth++;
      renderCalendar();
    });

    document.getElementById('btn-today').addEventListener('click', () => {
      const t = new Date();
      state.viewYear  = t.getFullYear();
      state.viewMonth = t.getMonth();
      renderCalendar();
      openDay(todayKey());
    });

    // パネルを閉じる
    document.getElementById('btn-close-panel').addEventListener('click', closePanel);

    // 写真
    document.getElementById('photo-input').addEventListener('change', e => {
      attachPhoto(e.target.files[0]);
    });
    document.getElementById('btn-remove-photo').addEventListener('click', removePhoto);

    // ノート自動保存
    document.getElementById('detail-note').addEventListener('input', scheduleAutosave);

    // 保存ボタン
    document.getElementById('btn-save').addEventListener('click', saveEntryNow);

    // タグ入力
    document.getElementById('detail-tag-input').addEventListener('keydown', e => {
      const val = e.target.value;
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        addTag(val);
      } else if (e.key === 'Backspace' && val === '') {
        const key = state.selectedDate;
        const tags = key && state.data[key] && state.data[key].tags;
        if (tags && tags.length > 0) removeTag(tags[tags.length - 1]);
      }
    });

    // タグ削除（委譲）
    document.getElementById('tag-display').addEventListener('click', e => {
      const btn = e.target.closest('.remove-tag');
      if (btn) removeTag(btn.dataset.tag);
    });

    // ── 初期化 ─────────────────────────────────────
    function init() {
      state.data = load();
      const t = new Date();
      state.viewYear  = t.getFullYear();
      state.viewMonth = t.getMonth();
      renderCalendar();
      // 今日を自動で開く
      openDay(todayKey());
    }

    init();

  })();
  </script>
</body>
</html>
