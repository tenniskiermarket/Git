<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>гғЎгӮҝиӘҚзҹҘж—ҘиЁҳ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
  <style>
    /* ===== гғҮгӮ¶гӮӨгғігғҲгғјгӮҜгғі ===== */
    :root {
      --bg:          #020208;
      --bg-alt:      #05050f;
      --surface:     #0a0a18;
      --surface2:    #0f0f22;
      --surface3:    #141428;
      --border:      rgba(99, 102, 241, 0.25);
      --border-cyan: rgba(0, 255, 200, 0.18);
      --accent:      #818cf8;
      --accent-dark: #6366f1;
      --accent-glow: rgba(129, 140, 248, 0.35);
      --cyan:        #22d3ee;
      --cyan-glow:   rgba(34, 211, 238, 0.25);
      --green:       #4ade80;
      --yellow:      #fbbf24;
      --red:         #f87171;
      --text:        #f1f5f9;
      --text-sub:    #cbd5e1;
      --muted:       #64748b;
      --radius:      12px;
      --radius-sm:   8px;
      --safe-b:      env(safe-area-inset-bottom, 0px);
      --safe-t:      env(safe-area-inset-top, 0px);
    }

    /* ===== гғӘгӮ»гғғгғҲ ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding-bottom: calc(72px + var(--safe-b));
      -webkit-font-smoothing: antialiased;
    }

    /* ===== гғҳгғғгғҖгғј ===== */
    #app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(2, 2, 8, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      padding-top: calc(12px + var(--safe-t));
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #header-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.05em;
      white-space: nowrap;
      text-shadow: 0 0 12px var(--accent-glow);
    }
    #date-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      justify-content: center;
    }
    .nav-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-sub);
      border-radius: var(--radius-sm);
      min-width: 40px;
      min-height: 40px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn:active { background: var(--surface3); color: var(--accent); }
    #date-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      min-width: 160px;
      text-align: center;
      line-height: 1.3;
    }
    #date-label small {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }
    #today-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent);
      border-radius: var(--radius-sm);
      padding: 0 12px;
      min-height: 40px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #today-btn:active { background: var(--surface3); }
    #today-btn.is-today {
      color: var(--muted);
      border-color: transparent;
    }

    /* ===== гӮҝгғ–гғҗгғј ===== */
    #tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 600px;
      height: calc(64px + var(--safe-b));
      display: flex;
      background: rgba(2, 2, 8, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      z-index: 100;
      padding-bottom: var(--safe-b);
    }
    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 500;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn .tab-icon { font-size: 22px; line-height: 1; }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active .tab-icon {
      filter: drop-shadow(0 0 6px var(--accent-glow));
    }

    /* ===== гғЎгӮӨгғігӮігғігғҶгғігғ„ ===== */
    #main-content { padding: 16px; }
    .view { display: none; animation: fadeIn 0.2s ease; }
    .view.active { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== зҠ¶ж…ӢгғҗгғғгӮё ===== */
    #status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    #status-badge.empty {
      background: rgba(100, 116, 139, 0.15);
      border: 1px solid var(--muted);
      color: var(--muted);
    }
    #status-badge.filled {
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.4);
      color: var(--green);
    }
    #status-badge .badge-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ===== гғ•гӮЈгғјгғ«гғүгӮ«гғјгғү ===== */
    .field-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .field-card:focus-within {
      border-color: var(--accent-dark);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.12);
    }
    .field-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
      display: block;
    }
    .field-label .field-icon { margin-right: 4px; }
    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: var(--text);
      font-size: 16px;
      font-family: 'Noto Sans JP', sans-serif;
      line-height: 1.7;
      min-height: 72px;
      overflow: hidden;
    }
    textarea::placeholder { color: var(--muted); }

    /* ===== дҝқеӯҳгӮЁгғӘгӮў ===== */
    #save-area {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
      padding-top: 4px;
    }
    #save-btn {
      flex: 1;
      background: var(--accent-dark);
      border: none;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      padding: 14px;
      border-radius: var(--radius);
      cursor: pointer;
      box-shadow: 0 0 16px rgba(99, 102, 241, 0.3);
      transition: background 0.15s, box-shadow 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #save-btn:active { background: #4f52c4; }
    #save-btn.empty { opacity: 0.4; }
    #save-indicator {
      font-size: 13px;
      color: var(--green);
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
    #save-indicator.show { opacity: 1; }

    /* ===== йҖұж¬ЎеҲҶжһҗгӮҝгғ– ===== */
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      text-shadow: 0 0 10px var(--cyan-glow);
    }
    .section-title .s-icon { font-size: 16px; }

    /* жңҹй–“гӮ»гғ¬гӮҜгӮҝ */
    #period-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .period-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .period-btn.active {
      background: rgba(99, 102, 241, 0.18);
      border-color: var(--accent-dark);
      color: var(--accent);
    }
    .period-btn:active { background: var(--surface3); }

    /* зөұиЁҲгӮөгғһгғӘгғј */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .stat-item {
      background: var(--surface2);
      border: 1px solid var(--border-cyan);
      border-radius: var(--radius-sm);
      padding: 12px 8px;
      text-align: center;
    }
    .stat-num {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-glow);
      line-height: 1.2;
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* гғ’гғјгғҲгғҗгғј */
    #heat-bar-wrap {
      margin-top: 14px;
    }
    #heat-bar-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    #heat-bar {
      display: flex;
      gap: 4px;
    }
    .heat-cell {
      flex: 1;
      height: 28px;
      border-radius: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      transition: background 0.2s;
    }
    .heat-cell.has-data { background: rgba(99, 102, 241, 0.35); border-color: var(--accent-dark); }
    .heat-cell.is-today { border-color: var(--cyan); box-shadow: 0 0 6px var(--cyan-glow); }
    .heat-cell-day {
      position: absolute;
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      color: var(--muted);
    }
    .heat-cell.has-data .heat-cell-day { color: var(--accent); }

    /* obstaclesдёҖиҰ§ */
    #obstacles-list { display: flex; flex-direction: column; gap: 10px; }
    .obstacle-item {
      background: var(--surface2);
      border: 1px solid var(--border-cyan);
      border-left: 3px solid var(--cyan);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
    }
    .obstacle-date {
      font-size: 11px;
      color: var(--cyan);
      font-weight: 700;
      margin-bottom: 4px;
      text-shadow: 0 0 8px var(--cyan-glow);
    }
    .obstacle-text {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .no-obstacles {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 14px;
    }

    /* гӮӯгғјгғҜгғјгғүгғҒгғғгғ— */
    #keyword-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .keyword-chip {
      background: rgba(99, 102, 241, 0.12);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 13px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 6px;
      animation: chipIn 0.2s ease both;
    }
    .keyword-chip .chip-count {
      background: var(--accent-dark);
      color: #fff;
      border-radius: 100px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Orbitron', sans-serif;
    }
    @keyframes chipIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    .no-keywords {
      font-size: 13px;
      color: var(--muted);
      padding: 8px 0;
    }

    /* гӮ№гӮҜгғӯгғјгғ«гғҗгғј */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ===== гғҳгғғгғҖгғј ===== -->
<header id="app-header">
  <span id="header-title">гғЎгӮҝиӘҚзҹҘж—ҘиЁҳ</span>
  <nav id="date-nav">
    <button class="nav-btn" id="prev-btn" aria-label="еүҚгҒ®ж—Ҙ">вҖ№</button>
    <div id="date-label">
      <span id="date-main">иӘӯгҒҝиҫјгҒҝдёӯ...</span>
      <small id="date-sub"></small>
    </div>
    <button class="nav-btn" id="next-btn" aria-label="ж¬ЎгҒ®ж—Ҙ">вҖә</button>
  </nav>
  <button id="today-btn">д»Ҡж—Ҙ</button>
</header>

<!-- ===== гғЎгӮӨгғігӮігғігғҶгғігғ„ ===== -->
<main id="main-content">

  <!-- гӮҝгғ–1: ж—ҘиЁҳе…ҘеҠӣ -->
  <div id="view-diary" class="view active">
    <div id="status-badge" class="empty">
      <span class="badge-dot"></span>
      <span id="status-text">жңӘиЁҳе…Ҙ</span>
    </div>

    <div class="field-card">
      <label class="field-label" for="field-goal">
        <span class="field-icon">рҹҺҜ</span>жң¬ж—ҘгҒ®зӣ®жЁҷ
      </label>
      <textarea id="field-goal" placeholder="д»Ҡж—ҘйҒ”жҲҗгҒ—гҒҹгҒ„гҒ“гҒЁгҒҜпјҹ"></textarea>
    </div>

    <div class="field-card">
      <label class="field-label" for="field-done">
        <span class="field-icon">вң…</span>е®ҹйҡӣгҒ«гӮ„гҒЈгҒҹдәӢгғ»еҫ—гӮүгӮҢгҒҹжҲҗжһң
      </label>
      <textarea id="field-done" placeholder="е®ҹйҡӣгҒ«еҸ–гӮҠзө„гӮ“гҒ гҒ“гҒЁгҖҒеҫ—гӮүгӮҢгҒҹжҲҗжһңгӮ’жӣёгҒ“гҒҶ"></textarea>
    </div>

    <div class="field-card">
      <label class="field-label" for="field-obstacles">
        <span class="field-icon">рҹ§ұ</span>гҒ¶гҒӨгҒӢгҒЈгҒҹеЈҒгғ»и©°гҒҫгҒЈгҒҹгғқгӮӨгғігғҲ
      </label>
      <textarea id="field-obstacles" placeholder="дҪ•гҒҢйӣЈгҒ—гҒӢгҒЈгҒҹпјҹгҒ©гҒ“гҒ§и©°гҒҫгҒЈгҒҹпјҹ"></textarea>
    </div>

    <div class="field-card">
      <label class="field-label" for="field-tomorrow">
        <span class="field-icon">рҹ”„</span>жҳҺж—ҘеӨүгҒҲгӮӢдәӢ
      </label>
      <textarea id="field-tomorrow" placeholder="жҳҺж—ҘгҒҜгҒ©гҒҶгӮўгғ—гғӯгғјгғҒгӮ’еӨүгҒҲгӮӢпјҹ"></textarea>
    </div>

    <div id="save-area">
      <button id="save-btn">дҝқеӯҳгҒҷгӮӢ</button>
      <span id="save-indicator">вң“ дҝқеӯҳжёҲгҒҝ</span>
    </div>
  </div>

  <!-- гӮҝгғ–2: йҖұж¬ЎеҲҶжһҗ -->
  <div id="view-analysis" class="view">
    <div id="period-selector">
      <button class="period-btn active" data-days="7">7ж—Ҙ</button>
      <button class="period-btn" data-days="14">14ж—Ҙ</button>
      <button class="period-btn" data-days="21">21ж—Ҙ</button>
      <button class="period-btn" data-days="28">28ж—Ҙ</button>
    </div>

    <!-- зөұиЁҲгӮөгғһгғӘгғј -->
    <div class="section-card">
      <div class="section-title"><span class="s-icon">рҹ“Ҳ</span>иЁҳйҢІгӮөгғһгғӘгғј</div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-num" id="stat-recorded">-</div>
          <div class="stat-label">иЁҳйҢІж—Ҙж•°</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="stat-rate">-%</div>
          <div class="stat-label">йҒ”жҲҗзҺҮ</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="stat-streak">-</div>
          <div class="stat-label">йҖЈз¶ҡж—Ҙж•°</div>
        </div>
      </div>
      <div id="heat-bar-wrap">
        <div id="heat-bar-label">иЁҳйҢІгғ’гғјгғҲгғҗгғј</div>
        <div id="heat-bar"></div>
      </div>
    </div>

    <!-- гҒ¶гҒӨгҒӢгҒЈгҒҹеЈҒ дёҖиҰ§ -->
    <div class="section-card">
      <div class="section-title"><span class="s-icon">рҹ§ұ</span>гҒ¶гҒӨгҒӢгҒЈгҒҹеЈҒгғ»дёҖиҰ§</div>
      <div id="obstacles-list"></div>
    </div>

    <!-- гӮӯгғјгғҜгғјгғүй »еәҰ -->
    <div class="section-card">
      <div class="section-title"><span class="s-icon">рҹ”Қ</span>з№°гӮҠиҝ”гҒ—гғ‘гӮҝгғјгғіпјҲгӮӯгғјгғҜгғјгғүпјү</div>
      <div id="keyword-chips"></div>
    </div>
  </div>

</main>

<!-- ===== гӮҝгғ–гғҗгғј ===== -->
<nav id="tab-bar">
  <button class="tab-btn active" data-tab="diary">
    <span class="tab-icon">вңҸпёҸ</span>
    <span>ж—ҘиЁҳ</span>
  </button>
  <button class="tab-btn" data-tab="analysis">
    <span class="tab-icon">рҹ“Ҡ</span>
    <span>йҖұж¬ЎеҲҶжһҗ</span>
  </button>
</nav>

<script>
(function () {
  'use strict';

  /* ===== е®ҡж•° ===== */
  const STORAGE_KEY    = 'diary_v1';
  const AUTOSAVE_DELAY = 700;
  const WEEKDAYS       = ['ж—Ҙ','жңҲ','зҒ«','ж°ҙ','жңЁ','йҮ‘','еңҹ'];

  const STOP_WORDS = new Set([
    'гҒ®','гҒ«','гҒҜ','гӮ’','гҒҢ','гҒ§','гҒЁ','гӮӮ','гҒӢгӮү','гҒҫгҒ§','гӮҲгӮҠ','гҒё','гӮ„','гҒӘ',
    'гҒ“гҒЁ','гҒ“гӮҢ','гҒқгӮҢ','гҒӮгӮҢ','гҒ©гӮҢ','гӮӮгҒ®','гҒЁгҒ“гӮҚ','гҒҹгӮҒ','гӮҲгҒҶ','гӮҸгҒ‘',
    'гҒҷгӮӢ','гҒ—гҒҹ','гҒ—гҒҰ','гҒ—гҒҰгҒҜ','гҒ—гҒҰгӮӮ','гҒҰгҒ„гӮӢ','гҒҰгҒ„гҒҹ','гҒҰгҒ„гҒҰ','гҒҰгҒ—гҒҫгҒҶ','гҒҰгҒ—гҒҫгҒЈгҒҹ',
    'гҒ„гӮӢ','гҒ„гҒҹ','гҒ„гҒҰ','гҒӮгӮӢ','гҒӮгҒЈгҒҹ','гҒӮгҒЈгҒҰ','гҒӘгӮӢ','гҒӘгҒЈгҒҹ','гҒӘгҒЈгҒҰ',
    'гҒ§гҒҚгӮӢ','гҒ§гҒҚгҒҹ','гҒ§гҒҚгҒҰ','гҒ§гҒҚгҒӘгҒ„','гҒ§гҒҚгҒӘгҒӢгҒЈгҒҹ',
    'гҒЁгҒ„гҒҶ','гҒ§гҒҜ','гҒ“гҒ®','гҒқгҒ®','гҒӮгҒ®','гҒ“гӮҢгӮү','гҒқгӮҢгӮү',
    'гҒҫгҒҹ','гҒ•гӮүгҒ«','гҒ—гҒӢгҒ—','гҒҹгҒ ','гҒЎгӮҮгҒЈгҒЁ','гҒӮгҒҫгӮҠ','гҒӘгҒ©','гҒЁгҒӢ','гҒҹгӮҠ',
    'гҒҫгҒҷ','гҒ§гҒҷ','гҒ§гҒ—гҒҹ','гҒҫгҒ—гҒҹ','гҒҫгҒӣгӮ“','гҒҸгҒ гҒ•гҒ„',
    'гҒ гҒЈгҒҹ','гҒ гҒӢгӮү','гҒ§гӮӮ','гҒ‘гҒ©','гҒ‘гӮҢгҒ©','гҒ®гҒ§','гҒ®гҒ«','гҒӢгӮү','гҒҹгӮҒ',
    'гҒ©гҒҶ','гҒ„гҒҶ','гҒӘгҒ„','гҒӘгҒӢгҒЈгҒҹ','гӮҲгҒҶгҒ«','гҒҹгӮҒгҒ«','гҒЁгҒ—гҒҰ','гҒ«гҒӨгҒ„гҒҰ',
    'гӮҲгҒҸ','гҒҫгҒ ','гӮӮгҒҶ','гҒҡгҒЈгҒЁ','е°‘гҒ—','гҒҷгҒ”гҒҸ','гҒӢгҒӘгӮҠ','гҒЁгҒҰгӮӮ','зү№гҒ«',
  ]);

  /* ===== гӮ№гғҶгғјгғҲ ===== */
  const state = {
    data:         {},
    currentDate:  '',
    activeTab:    'diary',
    analysisDays: 7,
  };

  let autosaveTimer = null;

  /* ===== StorageеұӨ ===== */
  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      state.data = raw ? JSON.parse(raw) : {};
    } catch (_) {
      state.data = {};
    }
  }

  function saveData() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
    } catch (e) {
      alert('дҝқеӯҳе®№йҮҸгҒҢдёҚи¶ігҒ—гҒҰгҒ„гҒҫгҒҷгҖӮеҸӨгҒ„гғҮгғјгӮҝгӮ’ж•ҙзҗҶгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ');
    }
  }

  function getEntry(key) {
    return state.data[key] || { goal: '', done: '', obstacles: '', tomorrow: '', updatedAt: 0 };
  }

  /* ===== ж—Ҙд»ҳгғҰгғјгғҶгӮЈгғӘгғҶгӮЈ ===== */
  function toDateKey(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function todayKey() {
    return toDateKey(new Date());
  }

  function offsetDate(key, delta) {
    const [y, m, d] = key.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    date.setDate(date.getDate() + delta);
    return toDateKey(date);
  }

  function formatDateLabel(key) {
    const [y, m, d] = key.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    const wd = WEEKDAYS[date.getDay()];
    return {
      main: `${y}е№ҙ${m}жңҲ${d}ж—ҘпјҲ${wd}пјү`,
      sub:  key === todayKey() ? 'д»Ҡж—Ҙ' : '',
    };
  }

  function escHtml(s) {
    return s
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ===== ж—ҘиЁҳе…ҘеҠӣз”»йқў ===== */
  function renderDiaryView() {
    const entry = getEntry(state.currentDate);
    document.getElementById('field-goal').value      = entry.goal;
    document.getElementById('field-done').value      = entry.done;
    document.getElementById('field-obstacles').value = entry.obstacles;
    document.getElementById('field-tomorrow').value  = entry.tomorrow;
    autoResizeAll();
    updateStatusBadge();
    updateSaveBtn();
  }

  function updateHeader() {
    const label = formatDateLabel(state.currentDate);
    document.getElementById('date-main').textContent = label.main;
    document.getElementById('date-sub').textContent  = label.sub;

    const isToday = state.currentDate === todayKey();
    const todayBtn = document.getElementById('today-btn');
    todayBtn.classList.toggle('is-today', isToday);

    // зҝҢж—ҘгғңгӮҝгғігҒҜд»Ҡж—ҘгӮҲгӮҠе…ҲгҒ«гҒҜиЎҢгҒ‘гҒӘгҒ„
    document.getElementById('next-btn').disabled = isToday;
    document.getElementById('next-btn').style.opacity = isToday ? '0.3' : '1';
  }

  function scheduleAutosave() {
    clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(() => {
      saveCurrentEntry();
      showSaveIndicator();
    }, AUTOSAVE_DELAY);
  }

  function saveCurrentEntry() {
    const entry = {
      goal:      document.getElementById('field-goal').value,
      done:      document.getElementById('field-done').value,
      obstacles: document.getElementById('field-obstacles').value,
      tomorrow:  document.getElementById('field-tomorrow').value,
      updatedAt: Date.now(),
    };
    const hasContent = entry.goal || entry.done || entry.obstacles || entry.tomorrow;
    if (hasContent) {
      state.data[state.currentDate] = entry;
    } else {
      delete state.data[state.currentDate];
    }
    saveData();
    updateStatusBadge();
    updateSaveBtn();
  }

  function showSaveIndicator() {
    const el = document.getElementById('save-indicator');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }

  function hasEntryContent(key) {
    const e = state.data[key];
    return e && (e.goal || e.done || e.obstacles || e.tomorrow);
  }

  function updateStatusBadge() {
    const badge = document.getElementById('status-badge');
    const text  = document.getElementById('status-text');
    const filled = hasEntryContent(state.currentDate);
    badge.classList.toggle('filled', !!filled);
    badge.classList.toggle('empty',  !filled);
    text.textContent = filled ? 'иЁҳе…ҘжёҲгҒҝ' : 'жңӘиЁҳе…Ҙ';
  }

  function updateSaveBtn() {
    const btn = document.getElementById('save-btn');
    const fields = ['field-goal','field-done','field-obstacles','field-tomorrow'];
    const hasValue = fields.some(id => document.getElementById(id).value.trim());
    btn.classList.toggle('empty', !hasValue);
  }

  function autoResizeTextarea(ta) {
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  }

  function autoResizeAll() {
    document.querySelectorAll('textarea').forEach(autoResizeTextarea);
  }

  /* ===== йҖұж¬ЎеҲҶжһҗ ===== */
  function renderAnalysisView() {
    const days = state.analysisDays;
    const entries = collectObstaclesData(days);

    renderAnalysisStats(days, entries);
    renderHeatBar(days);
    renderObstaclesList(entries);
    renderKeywordChips(entries);
  }

  function renderAnalysisStats(days, entries) {
    const recorded = countRecordedDays(days);
    const rate     = Math.round((recorded / days) * 100);
    const streak   = calcStreak();

    document.getElementById('stat-recorded').textContent = `${recorded}/${days}`;
    document.getElementById('stat-rate').textContent     = `${rate}%`;
    document.getElementById('stat-streak').textContent   = `${streak}ж—Ҙ`;
  }

  function countRecordedDays(days) {
    let count = 0;
    const now = new Date();
    for (let i = 0; i < days; i++) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      if (hasEntryContent(toDateKey(d))) count++;
    }
    return count;
  }

  function renderHeatBar(days) {
    const bar   = document.getElementById('heat-bar');
    const today = todayKey();
    bar.innerHTML = '';
    for (let i = days - 1; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const key = toDateKey(d);
      const cell = document.createElement('div');
      cell.className = 'heat-cell';
      if (hasEntryContent(key)) cell.classList.add('has-data');
      if (key === today)        cell.classList.add('is-today');
      const dayLabel = document.createElement('span');
      dayLabel.className = 'heat-cell-day';
      dayLabel.textContent = WEEKDAYS[d.getDay()];
      cell.appendChild(dayLabel);
      bar.appendChild(cell);
    }
  }

  function collectObstaclesData(days) {
    const entries = [];
    const now = new Date();
    for (let i = days - 1; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      const key   = toDateKey(d);
      const entry = state.data[key];
      if (entry && entry.obstacles && entry.obstacles.trim()) {
        entries.push({ key, date: d, text: entry.obstacles });
      }
    }
    return entries;
  }

  function renderObstaclesList(entries) {
    const list = document.getElementById('obstacles-list');
    if (entries.length === 0) {
      list.innerHTML = '<div class="no-obstacles">иЁҳйҢІгҒ•гӮҢгҒҹгҖҢгҒ¶гҒӨгҒӢгҒЈгҒҹеЈҒгҖҚгҒҜгҒӮгӮҠгҒҫгҒӣгӮ“</div>';
      return;
    }
    list.innerHTML = entries.map(({ key, text }) => {
      const [y, m, d] = key.split('-').map(Number);
      const date  = new Date(y, m - 1, d);
      const label = `${m}жңҲ${d}ж—ҘпјҲ${WEEKDAYS[date.getDay()]}пјү`;
      return `
        <div class="obstacle-item">
          <div class="obstacle-date">${escHtml(label)}</div>
          <div class="obstacle-text">${escHtml(text)}</div>
        </div>`;
    }).join('');
  }

  function renderKeywordChips(entries) {
    const container = document.getElementById('keyword-chips');
    const freq = buildWordFrequency(entries);
    if (freq.length === 0) {
      container.innerHTML = '<div class="no-keywords">гӮӯгғјгғҜгғјгғүгғҮгғјгӮҝгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“</div>';
      return;
    }
    // й »еәҰгҒҢ2еӣһд»ҘдёҠгҒ®гӮӮгҒ®гҒ гҒ‘гғҒгғғгғ—иЎЁзӨәгҖӮгҒӘгҒ‘гӮҢгҒ°е…ЁйғЁиЎЁзӨә
    const filtered = freq.filter(([, c]) => c >= 2);
    const display  = filtered.length > 0 ? filtered : freq.slice(0, 10);
    container.innerHTML = display.map(([word, count], i) => `
      <div class="keyword-chip" style="animation-delay:${i * 0.03}s">
        <span>${escHtml(word)}</span>
        <span class="chip-count">Г—${count}</span>
      </div>`
    ).join('');
  }

  function buildWordFrequency(entries) {
    const freq = {};
    entries.forEach(({ text }) => {
      extractKeywords(text).forEach(w => {
        freq[w] = (freq[w] || 0) + 1;
      });
    });
    return Object.entries(freq)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 20);
  }

  function extractKeywords(text) {
    return text
      .split(/[\s\u3000гҖҒгҖӮпјҒпјҹ!?,.вҖҰ\nгҖҢгҖҚгҖҗгҖ‘гҖҺгҖҸпјҲпјү()\[\]\/\\пјҡ:пјӣ;гғ»]+/)
      .map(w => w.trim())
      .filter(w =>
        w.length >= 2 &&
        w.length <= 15 &&
        !STOP_WORDS.has(w) &&
        /[^\dпјҗ-пјҷ]/.test(w)
      );
  }

  function calcStreak() {
    let streak = 0;
    const now  = new Date();
    for (let i = 0; i < 365; i++) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      if (hasEntryContent(toDateKey(d))) {
        streak++;
      } else {
        break;
      }
    }
    return streak;
  }

  /* ===== гӮӨгғҷгғігғҲгғ»еҲқжңҹеҢ– ===== */
  function switchTab(tab) {
    state.activeTab = tab;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`view-${tab}`).classList.add('active');
    document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
    if (tab === 'analysis') renderAnalysisView();
  }

  function navigateDate(delta) {
    if (delta > 0 && state.currentDate === todayKey()) return;
    clearTimeout(autosaveTimer);
    state.currentDate = offsetDate(state.currentDate, delta);
    updateHeader();
    renderDiaryView();
  }

  function goToToday() {
    clearTimeout(autosaveTimer);
    state.currentDate = todayKey();
    updateHeader();
    renderDiaryView();
  }

  function initEventListeners() {
    // гӮҝгғ–еҲҮжӣҝ
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    // ж—Ҙд»ҳгғҠгғ“
    document.getElementById('prev-btn').addEventListener('click', () => navigateDate(-1));
    document.getElementById('next-btn').addEventListener('click', () => navigateDate(+1));
    document.getElementById('today-btn').addEventListener('click', goToToday);

    // гғҶгӮӯгӮ№гғҲгӮЁгғӘгӮў иҮӘеӢ•дҝқеӯҳ + иҮӘеӢ•гғӘгӮөгӮӨгӮә
    ['field-goal','field-done','field-obstacles','field-tomorrow'].forEach(id => {
      const ta = document.getElementById(id);
      ta.addEventListener('input', () => {
        autoResizeTextarea(ta);
        updateSaveBtn();
        scheduleAutosave();
      });
    });

    // дҝқеӯҳгғңгӮҝгғі
    document.getElementById('save-btn').addEventListener('click', () => {
      clearTimeout(autosaveTimer);
      saveCurrentEntry();
      showSaveIndicator();
    });

    // жңҹй–“гӮ»гғ¬гӮҜгӮҝ
    document.querySelectorAll('.period-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.analysisDays = Number(btn.dataset.days);
        renderAnalysisView();
      });
    });

    // гӮ№гғҜгӮӨгғ—гҒ§ж—Ҙд»ҳз§»еӢ•
    let touchStartX = 0;
    const mainContent = document.getElementById('main-content');
    mainContent.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].clientX;
    }, { passive: true });
    mainContent.addEventListener('touchend', e => {
      if (state.activeTab !== 'diary') return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 60) navigateDate(dx < 0 ? -1 : +1);
    }, { passive: true });
  }

  function init() {
    loadData();
    state.currentDate = todayKey();
    updateHeader();
    renderDiaryView();
    initEventListeners();
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
