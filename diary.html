<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>METAlog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ===== デザイントークン ===== */
    :root {
      --bg:        #0c0f0e;
      --surface:   #141a17;
      --surface2:  #1b2320;
      --surface3:  #222e29;
      --border:    rgba(160, 196, 163, 0.12);
      --border2:   rgba(160, 196, 163, 0.22);
      --accent:    #7eb87e;
      --accent2:   #5a9e5a;
      --sky:       #8ab4cc;
      --green-dim: rgba(126, 184, 126, 0.15);
      --green-mid: rgba(126, 184, 126, 0.3);
      --text:      #dde6df;
      --text-sub:  #9eb5a2;
      --muted:     #5a7062;
      --red:       #e07070;
      --radius:    14px;
      --radius-sm: 9px;
      --safe-b:    env(safe-area-inset-bottom, 0px);
      --safe-t:    env(safe-area-inset-top, 0px);
    }

    /* ===== リセット ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding-bottom: calc(72px + var(--safe-b));
      -webkit-font-smoothing: antialiased;
    }

    /* ===== ヘッダー ===== */
    #app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(12, 15, 14, 0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      padding-top: calc(10px + var(--safe-t));
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #header-title {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    #date-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      justify-content: center;
    }
    .nav-btn {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text-sub);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn:active { background: var(--surface2); color: var(--accent); }
    #date-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      min-width: 160px;
      text-align: center;
      line-height: 1.4;
    }
    #date-label small {
      display: block;
      font-size: 10px;
      color: var(--accent);
      font-weight: 400;
      margin-top: 1px;
    }
    #today-btn {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--accent);
      border-radius: 20px;
      padding: 0 12px;
      height: 34px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #today-btn:active { background: var(--surface2); }
    #today-btn.is-today { color: var(--muted); border-color: transparent; }

    /* ===== 自然ヒーロー画像 ===== */
    #hero-nature {
      width: 100%;
      height: 140px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }
    #hero-nature svg {
      width: 100%;
      height: 100%;
    }

    /* ===== タブバー ===== */
    #tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 600px;
      height: calc(62px + var(--safe-b));
      display: flex;
      background: rgba(12, 15, 14, 0.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      z-index: 100;
      padding-bottom: var(--safe-b);
    }
    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 500;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn .tab-icon { font-size: 20px; line-height: 1; }
    .tab-btn.active { color: var(--accent); }

    /* ===== メインコンテンツ ===== */
    #main-content { padding: 18px 16px; }
    .view { display: none; animation: fadeIn 0.22s ease; }
    .view.active { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== 状態バッジ ===== */
    #status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 11px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
      margin-bottom: 18px;
    }
    #status-badge.empty {
      background: rgba(90, 112, 98, 0.18);
      border: 1px solid var(--muted);
      color: var(--muted);
    }
    #status-badge.filled {
      background: var(--green-dim);
      border: 1px solid var(--border2);
      color: var(--accent);
    }
    #status-badge .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ===== フィールドカード ===== */
    .field-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      transition: border-color 0.2s, background 0.2s;
    }
    .field-card:focus-within {
      border-color: var(--border2);
      background: var(--surface2);
    }
    .field-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-sub);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .field-label .label-bar {
      display: inline-block;
      width: 3px;
      height: 13px;
      border-radius: 2px;
      background: var(--accent2);
      flex-shrink: 0;
    }
    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: var(--text);
      font-size: 16px;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      line-height: 1.8;
      min-height: 70px;
      overflow: hidden;
    }
    textarea::placeholder {
      color: var(--muted);
      font-weight: 300;
    }

    /* ===== 保存エリア ===== */
    #save-area {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
    }
    #save-btn {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
      font-family: 'Noto Sans JP', sans-serif;
      padding: 15px;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s, border-color 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #save-btn:active { background: var(--surface3); }
    #save-btn.empty { opacity: 0.35; }
    #save-indicator {
      font-size: 12px;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
    #save-indicator.show { opacity: 1; }

    /* ===== 週次分析タブ ===== */
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-sub);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .section-title::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 13px;
      border-radius: 2px;
      background: var(--accent2);
      flex-shrink: 0;
    }

    /* 期間セレクタ */
    #period-selector {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }
    .period-btn {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: var(--radius-sm);
      padding: 9px 0;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      text-align: center;
    }
    .period-btn.active {
      background: var(--green-dim);
      border-color: var(--border2);
      color: var(--accent);
    }
    .period-btn:active { background: var(--surface2); }

    /* 統計サマリー */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .stat-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 8px;
      text-align: center;
    }
    .stat-num {
      font-family: 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--accent);
      line-height: 1.2;
    }
    .stat-label {
      font-size: 10px;
      color: var(--muted);
      margin-top: 5px;
      letter-spacing: 0.03em;
    }

    /* ヒートバー */
    #heat-bar-wrap { margin-top: 16px; }
    #heat-bar-label {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 7px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    #heat-bar { display: flex; gap: 3px; }
    .heat-cell {
      flex: 1;
      height: 30px;
      border-radius: 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      transition: background 0.2s;
    }
    .heat-cell.has-data { background: var(--green-mid); border-color: var(--border2); }
    .heat-cell.is-today { border-color: var(--accent); }
    .heat-cell-day {
      position: absolute;
      bottom: 3px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      color: var(--muted);
    }
    .heat-cell.has-data .heat-cell-day { color: var(--accent); }

    /* obstacles一覧 */
    #obstacles-list { display: flex; flex-direction: column; gap: 10px; }
    .obstacle-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
    }
    .obstacle-date {
      font-size: 10px;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .obstacle-text {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      font-weight: 300;
    }
    .no-obstacles {
      text-align: center;
      padding: 28px;
      color: var(--muted);
      font-size: 13px;
    }

    /* キーワードチップ */
    #keyword-chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .keyword-chip {
      background: var(--green-dim);
      border: 1px solid var(--border2);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 13px;
      color: var(--text-sub);
      display: flex;
      align-items: center;
      gap: 7px;
      animation: chipIn 0.2s ease both;
    }
    .keyword-chip .chip-count {
      font-family: 'Inter', sans-serif;
      background: var(--accent2);
      color: #fff;
      border-radius: 100px;
      padding: 1px 7px;
      font-size: 10px;
      font-weight: 600;
    }
    @keyframes chipIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }
    .no-keywords { font-size: 13px; color: var(--muted); padding: 8px 0; }

    /* スクロールバー */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ===== ヘッダー ===== -->
<header id="app-header">
  <span id="header-title">METAlog</span>
  <nav id="date-nav">
    <button class="nav-btn" id="prev-btn" aria-label="前の日">‹</button>
    <div id="date-label">
      <span id="date-main">読み込み中...</span>
      <small id="date-sub"></small>
    </div>
    <button class="nav-btn" id="next-btn" aria-label="次の日">›</button>
  </nav>
  <button id="today-btn">今日</button>
</header>

<!-- ===== 自然ヒーロー ===== -->
<div id="hero-nature" aria-hidden="true">
  <svg viewBox="0 0 600 140" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="sky-grad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#0c1a1e"/>
        <stop offset="60%"  stop-color="#0f2318"/>
        <stop offset="100%" stop-color="#0c0f0e"/>
      </linearGradient>
      <linearGradient id="moon-grad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#c8dcc0"/>
        <stop offset="100%" stop-color="#8aaa82"/>
      </linearGradient>
    </defs>
    <!-- 空のグラデーション -->
    <rect width="600" height="140" fill="url(#sky-grad)"/>
    <!-- 星 -->
    <circle cx="60"  cy="18" r="1"   fill="#c8dcc0" opacity="0.6"/>
    <circle cx="130" cy="10" r="1.3" fill="#c8dcc0" opacity="0.5"/>
    <circle cx="210" cy="22" r="0.8" fill="#c8dcc0" opacity="0.7"/>
    <circle cx="300" cy="8"  r="1.1" fill="#c8dcc0" opacity="0.4"/>
    <circle cx="380" cy="16" r="1"   fill="#c8dcc0" opacity="0.6"/>
    <circle cx="450" cy="6"  r="1.4" fill="#c8dcc0" opacity="0.5"/>
    <circle cx="530" cy="20" r="0.9" fill="#c8dcc0" opacity="0.7"/>
    <circle cx="90"  cy="35" r="0.7" fill="#c8dcc0" opacity="0.35"/>
    <circle cx="260" cy="30" r="0.8" fill="#c8dcc0" opacity="0.35"/>
    <circle cx="500" cy="28" r="0.7" fill="#c8dcc0" opacity="0.3"/>
    <!-- 月 -->
    <circle cx="495" cy="32" r="14" fill="url(#moon-grad)" opacity="0.85"/>
    <circle cx="490" cy="27" r="12" fill="#0f2318" opacity="0.65"/>
    <!-- 遠景の山 -->
    <path d="M0,95 L80,52 L160,88 L240,42 L320,78 L400,38 L480,70 L560,48 L600,65 L600,140 L0,140 Z"
          fill="#0f1f18" opacity="0.9"/>
    <!-- 中景の山 -->
    <path d="M0,110 L60,75 L120,100 L200,62 L280,95 L360,58 L440,88 L510,68 L570,82 L600,72 L600,140 L0,140 Z"
          fill="#111f17" opacity="0.95"/>
    <!-- 手前の森のシルエット -->
    <!-- 木々（左） -->
    <path d="M-5,140 L-5,105 L5,82 L15,105 L15,140 Z" fill="#0d1a12"/>
    <path d="M8,140 L8,108 L18,88 L28,108 L28,140 Z" fill="#0d1a12"/>
    <path d="M20,140 L20,112 L32,90 L44,112 L44,140 Z" fill="#0d1a12"/>
    <path d="M38,140 L38,115 L48,95 L58,115 L58,140 Z" fill="#0d1a12"/>
    <path d="M52,140 L52,110 L64,86 L76,110 L76,140 Z" fill="#0d1a12"/>
    <path d="M68,140 L68,118 L78,98 L88,118 L88,140 Z" fill="#0d1a12"/>
    <!-- 木々（右） -->
    <path d="M515,140 L515,118 L525,96 L535,118 L535,140 Z" fill="#0d1a12"/>
    <path d="M530,140 L530,112 L542,88 L554,112 L554,140 Z" fill="#0d1a12"/>
    <path d="M548,140 L548,116 L560,92 L572,116 L572,140 Z" fill="#0d1a12"/>
    <path d="M565,140 L565,110 L577,86 L589,110 L589,140 Z" fill="#0d1a12"/>
    <path d="M582,140 L582,115 L594,92 L606,115 L606,140 Z" fill="#0d1a12"/>
    <!-- 最手前の地面 -->
    <path d="M0,130 Q150,118 300,125 Q450,132 600,124 L600,140 L0,140 Z"
          fill="#0c0f0e"/>
    <!-- 地面の草ライン -->
    <path d="M0,133 Q150,121 300,128 Q450,135 600,127"
          stroke="#1a3020" stroke-width="1.5" fill="none" opacity="0.6"/>
  </svg>
</div>

<!-- ===== メインコンテンツ ===== -->
<main id="main-content">

  <!-- タブ1: 日記入力 -->
  <div id="view-diary" class="view active">
    <div id="status-badge" class="empty">
      <span class="badge-dot"></span>
      <span id="status-text">未記入</span>
    </div>

    <div class="field-card">
      <label class="field-label" for="field-goal">
        <span class="label-bar"></span>本日の目標
      </label>
      <textarea id="field-goal" placeholder="今日達成したいことは？"></textarea>
    </div>

    <div class="field-card">
      <label class="field-label" for="field-done">
        <span class="label-bar"></span>実際にやった事・得られた成果
      </label>
      <textarea id="field-done" placeholder="実際に取り組んだこと、得られた成果を書こう"></textarea>
    </div>

    <div class="field-card">
      <label class="field-label" for="field-obstacles">
        <span class="label-bar"></span>ぶつかった壁・詰まったポイント
      </label>
      <textarea id="field-obstacles" placeholder="何が難しかった？どこで詰まった？"></textarea>
    </div>

    <div class="field-card">
      <label class="field-label" for="field-tomorrow">
        <span class="label-bar"></span>明日変える事
      </label>
      <textarea id="field-tomorrow" placeholder="明日はどうアプローチを変える？"></textarea>
    </div>

    <div id="save-area">
      <button id="save-btn">保存する</button>
      <span id="save-indicator">✓ 保存しました</span>
    </div>
  </div>

  <!-- タブ2: 週次分析 -->
  <div id="view-analysis" class="view">
    <div id="period-selector">
      <button class="period-btn active" data-days="7">7日</button>
      <button class="period-btn" data-days="14">14日</button>
      <button class="period-btn" data-days="21">21日</button>
      <button class="period-btn" data-days="28">28日</button>
    </div>

    <div class="section-card">
      <div class="section-title">記録サマリー</div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-num" id="stat-recorded">-</div>
          <div class="stat-label">記録日数</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="stat-rate">-%</div>
          <div class="stat-label">達成率</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="stat-streak">-</div>
          <div class="stat-label">連続日数</div>
        </div>
      </div>
      <div id="heat-bar-wrap">
        <div id="heat-bar-label">記録ヒートバー</div>
        <div id="heat-bar"></div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-title">ぶつかった壁・一覧</div>
      <div id="obstacles-list"></div>
    </div>

    <div class="section-card">
      <div class="section-title">繰り返しパターン（キーワード）</div>
      <div id="keyword-chips"></div>
    </div>
  </div>

</main>

<!-- ===== タブバー ===== -->
<nav id="tab-bar">
  <button class="tab-btn active" data-tab="diary">
    <span class="tab-icon">✏️</span>
    <span>日記</span>
  </button>
  <button class="tab-btn" data-tab="analysis">
    <span class="tab-icon">📊</span>
    <span>週次分析</span>
  </button>
</nav>

<script>
(function () {
  'use strict';

  const STORAGE_KEY    = 'diary_v1';
  const AUTOSAVE_DELAY = 700;
  const WEEKDAYS       = ['日','月','火','水','木','金','土'];

  const STOP_WORDS = new Set([
    'の','に','は','を','が','で','と','も','から','まで','より','へ','や','な',
    'こと','これ','それ','あれ','どれ','もの','ところ','ため','よう','わけ',
    'する','した','して','しては','しても','ている','ていた','ていて','てしまう','てしまった',
    'いる','いた','いて','ある','あった','あって','なる','なった','なって',
    'できる','できた','できて','できない','できなかった',
    'という','では','この','その','あの','これら','それら',
    'また','さらに','しかし','ただ','ちょっと','あまり','など','とか','たり',
    'ます','です','でした','ました','ません','ください',
    'だった','だから','でも','けど','けれど','ので','のに','から','ため',
    'どう','いう','ない','なかった','ように','ために','として','について',
    'よく','まだ','もう','ずっと','少し','すごく','かなり','とても','特に',
  ]);

  const state = {
    data:         {},
    currentDate:  '',
    activeTab:    'diary',
    analysisDays: 7,
  };

  let autosaveTimer = null;

  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      state.data = raw ? JSON.parse(raw) : {};
    } catch (_) { state.data = {}; }
  }

  function saveData() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
    } catch (e) {
      alert('保存容量が不足しています。古いデータを整理してください。');
    }
  }

  function getEntry(key) {
    return state.data[key] || { goal: '', done: '', obstacles: '', tomorrow: '', updatedAt: 0 };
  }

  function toDateKey(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function todayKey() { return toDateKey(new Date()); }

  function offsetDate(key, delta) {
    const [y, m, d] = key.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    date.setDate(date.getDate() + delta);
    return toDateKey(date);
  }

  function formatDateLabel(key) {
    const [y, m, d] = key.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    const wd = WEEKDAYS[date.getDay()];
    return {
      main: `${y}年${m}月${d}日（${wd}）`,
      sub:  key === todayKey() ? '今日' : '',
    };
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderDiaryView() {
    const entry = getEntry(state.currentDate);
    document.getElementById('field-goal').value      = entry.goal;
    document.getElementById('field-done').value      = entry.done;
    document.getElementById('field-obstacles').value = entry.obstacles;
    document.getElementById('field-tomorrow').value  = entry.tomorrow;
    autoResizeAll();
    updateStatusBadge();
    updateSaveBtn();
  }

  function updateHeader() {
    const label = formatDateLabel(state.currentDate);
    document.getElementById('date-main').textContent = label.main;
    document.getElementById('date-sub').textContent  = label.sub;
    const isToday = state.currentDate === todayKey();
    document.getElementById('today-btn').classList.toggle('is-today', isToday);
    document.getElementById('next-btn').disabled     = isToday;
    document.getElementById('next-btn').style.opacity = isToday ? '0.3' : '1';
  }

  function scheduleAutosave() {
    clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(() => { saveCurrentEntry(); showSaveIndicator(); }, AUTOSAVE_DELAY);
  }

  function saveCurrentEntry() {
    const entry = {
      goal:      document.getElementById('field-goal').value,
      done:      document.getElementById('field-done').value,
      obstacles: document.getElementById('field-obstacles').value,
      tomorrow:  document.getElementById('field-tomorrow').value,
      updatedAt: Date.now(),
    };
    const hasContent = entry.goal || entry.done || entry.obstacles || entry.tomorrow;
    if (hasContent) { state.data[state.currentDate] = entry; }
    else            { delete state.data[state.currentDate]; }
    saveData();
    updateStatusBadge();
    updateSaveBtn();
  }

  function showSaveIndicator() {
    const el = document.getElementById('save-indicator');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }

  function hasEntryContent(key) {
    const e = state.data[key];
    return e && (e.goal || e.done || e.obstacles || e.tomorrow);
  }

  function updateStatusBadge() {
    const badge  = document.getElementById('status-badge');
    const text   = document.getElementById('status-text');
    const filled = hasEntryContent(state.currentDate);
    badge.classList.toggle('filled', !!filled);
    badge.classList.toggle('empty',  !filled);
    text.textContent = filled ? '記入済み' : '未記入';
  }

  function updateSaveBtn() {
    const btn = document.getElementById('save-btn');
    const hasValue = ['field-goal','field-done','field-obstacles','field-tomorrow']
      .some(id => document.getElementById(id).value.trim());
    btn.classList.toggle('empty', !hasValue);
  }

  function autoResizeTextarea(ta) {
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  }

  function autoResizeAll() {
    document.querySelectorAll('textarea').forEach(autoResizeTextarea);
  }

  function renderAnalysisView() {
    const days    = state.analysisDays;
    const entries = collectObstaclesData(days);
    renderAnalysisStats(days, entries);
    renderHeatBar(days);
    renderObstaclesList(entries);
    renderKeywordChips(entries);
  }

  function renderAnalysisStats(days) {
    const recorded = countRecordedDays(days);
    const rate     = Math.round((recorded / days) * 100);
    const streak   = calcStreak();
    document.getElementById('stat-recorded').textContent = `${recorded}/${days}`;
    document.getElementById('stat-rate').textContent     = `${rate}%`;
    document.getElementById('stat-streak').textContent   = `${streak}日`;
  }

  function countRecordedDays(days) {
    let count = 0;
    const now = new Date();
    for (let i = 0; i < days; i++) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      if (hasEntryContent(toDateKey(d))) count++;
    }
    return count;
  }

  function renderHeatBar(days) {
    const bar   = document.getElementById('heat-bar');
    const today = todayKey();
    bar.innerHTML = '';
    for (let i = days - 1; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const key  = toDateKey(d);
      const cell = document.createElement('div');
      cell.className = 'heat-cell';
      if (hasEntryContent(key)) cell.classList.add('has-data');
      if (key === today)        cell.classList.add('is-today');
      const dayLabel = document.createElement('span');
      dayLabel.className   = 'heat-cell-day';
      dayLabel.textContent = WEEKDAYS[d.getDay()];
      cell.appendChild(dayLabel);
      bar.appendChild(cell);
    }
  }

  function collectObstaclesData(days) {
    const entries = [];
    const now = new Date();
    for (let i = days - 1; i >= 0; i--) {
      const d     = new Date(now);
      d.setDate(d.getDate() - i);
      const key   = toDateKey(d);
      const entry = state.data[key];
      if (entry && entry.obstacles && entry.obstacles.trim()) {
        entries.push({ key, date: d, text: entry.obstacles });
      }
    }
    return entries;
  }

  function renderObstaclesList(entries) {
    const list = document.getElementById('obstacles-list');
    if (entries.length === 0) {
      list.innerHTML = '<div class="no-obstacles">記録された「ぶつかった壁」はありません</div>';
      return;
    }
    list.innerHTML = entries.map(({ key, text }) => {
      const [y, m, d] = key.split('-').map(Number);
      const date  = new Date(y, m - 1, d);
      const label = `${m}月${d}日（${WEEKDAYS[date.getDay()]}）`;
      return `<div class="obstacle-item">
        <div class="obstacle-date">${escHtml(label)}</div>
        <div class="obstacle-text">${escHtml(text)}</div>
      </div>`;
    }).join('');
  }

  function renderKeywordChips(entries) {
    const container = document.getElementById('keyword-chips');
    const freq      = buildWordFrequency(entries);
    if (freq.length === 0) {
      container.innerHTML = '<div class="no-keywords">キーワードデータがありません</div>';
      return;
    }
    const filtered = freq.filter(([, c]) => c >= 2);
    const display  = filtered.length > 0 ? filtered : freq.slice(0, 10);
    container.innerHTML = display.map(([word, count], i) =>
      `<div class="keyword-chip" style="animation-delay:${i*0.03}s">
        <span>${escHtml(word)}</span>
        <span class="chip-count">×${count}</span>
      </div>`
    ).join('');
  }

  function buildWordFrequency(entries) {
    const freq = {};
    entries.forEach(({ text }) => {
      extractKeywords(text).forEach(w => { freq[w] = (freq[w] || 0) + 1; });
    });
    return Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 20);
  }

  function extractKeywords(text) {
    return text
      .split(/[\s\u3000、。！？!?,.…\n「」【】『』（）()\[\]\/\\：:；;・]+/)
      .map(w => w.trim())
      .filter(w => w.length >= 2 && w.length <= 15 && !STOP_WORDS.has(w) && /[^\d０-９]/.test(w));
  }

  function calcStreak() {
    let streak = 0;
    const now  = new Date();
    for (let i = 0; i < 365; i++) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      if (hasEntryContent(toDateKey(d))) streak++;
      else break;
    }
    return streak;
  }

  function switchTab(tab) {
    state.activeTab = tab;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`view-${tab}`).classList.add('active');
    document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
    if (tab === 'analysis') renderAnalysisView();
  }

  function navigateDate(delta) {
    if (delta > 0 && state.currentDate === todayKey()) return;
    clearTimeout(autosaveTimer);
    state.currentDate = offsetDate(state.currentDate, delta);
    updateHeader();
    renderDiaryView();
  }

  function goToToday() {
    clearTimeout(autosaveTimer);
    state.currentDate = todayKey();
    updateHeader();
    renderDiaryView();
  }

  function initEventListeners() {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });
    document.getElementById('prev-btn').addEventListener('click', () => navigateDate(-1));
    document.getElementById('next-btn').addEventListener('click', () => navigateDate(+1));
    document.getElementById('today-btn').addEventListener('click', goToToday);

    ['field-goal','field-done','field-obstacles','field-tomorrow'].forEach(id => {
      const ta = document.getElementById(id);
      ta.addEventListener('input', () => {
        autoResizeTextarea(ta);
        updateSaveBtn();
        scheduleAutosave();
      });
    });

    document.getElementById('save-btn').addEventListener('click', () => {
      clearTimeout(autosaveTimer);
      saveCurrentEntry();
      showSaveIndicator();
    });

    document.querySelectorAll('.period-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.analysisDays = Number(btn.dataset.days);
        renderAnalysisView();
      });
    });

    let touchStartX = 0;
    const mainContent = document.getElementById('main-content');
    mainContent.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].clientX;
    }, { passive: true });
    mainContent.addEventListener('touchend', e => {
      if (state.activeTab !== 'diary') return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 60) navigateDate(dx < 0 ? -1 : +1);
    }, { passive: true });
  }

  function init() {
    loadData();
    state.currentDate = todayKey();
    updateHeader();
    renderDiaryView();
    initEventListeners();
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
